name: PR Changelog With Copilot

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: read

jobs:
  update-readme-changelog:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Generate changelog text with Copilot-backed model
        env:
          COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          COPILOT_MODEL: ${{ vars.COPILOT_MODEL || 'openai/gpt-4.1' }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python scripts/update_readme_changelog.py

      - name: Commit README changelog update
        run: |
          if git diff --quiet -- README.md; then
            echo "README.md is unchanged."
            exit 0
          fi

          git add README.md
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m "docs: update README changelog for PR #${{ github.event.pull_request.number }}"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
